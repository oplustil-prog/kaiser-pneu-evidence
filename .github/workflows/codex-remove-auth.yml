name: Codex remove in-app auth

on:
  push:
    paths:
      - .github/workflows/codex-remove-auth.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Apply verified auth removal patch
        run: |
          git show HEAD^:.github/workflows/codex-remove-auth.yml > /tmp/codex-remove-auth-previous.yml
          python3 <<'PY'
          import base64
          import gzip
          import pathlib
          import re

          text = pathlib.Path('/tmp/codex-remove-auth-previous.yml').read_text(encoding='utf-8')
          match = re.search(r"encoded = '''(?P<data>[\s\S]*?)'''", text)
          if not match:
              raise SystemExit('Patch payload not found in previous workflow file')
          encoded = ''.join(match.group('data').split())
          patch = gzip.decompress(base64.b64decode(encoded))
          pathlib.Path('/tmp/kaiser-remove-auth.patch').write_bytes(patch)
          PY
          git apply --index /tmp/kaiser-remove-auth.patch
          rm -f .github/workflows/codex-remove-auth.yml
          for f in *.js; do node --check "$f"; done
          git diff --check
          git config user.name "oplustil-prog"
          git config user.email "oplustil@kaiserservis.cz"
          git add -A
          git commit -m "Remove in-app authentication"
          git push
